services:
  ollama:
    image: ollama/ollama:latest
    container_name: askjawad-ollama
    ports:
      - "11439:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pull the model on first run
  ollama-init:
    image: ollama/ollama:latest
    container_name: askjawad-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "tinyllama"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  web:
    build: .
    container_name: askjawad-web
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - OLLAMA_URL=http://ollama:11439
      - OLLAMA_MODEL=tinyllama
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
